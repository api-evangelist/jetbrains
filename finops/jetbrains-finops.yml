specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: JetBrains
providerId: jetbrains
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - FinOps
  - FOCUS
  - Developer Tools
  - IDE
  - DevOps
description: 'FOCUS-aligned FinOps for JetBrains: per-seat IDE subscriptions, per-build-agent CI subscriptions,
  per-user collaboration subscriptions (Space, YouTrack), and AI-credit metering for JetBrains AI.'
sources:
  - https://www.jetbrains.com/store/
  - https://www.jetbrains.com/ai-ides/buy/
  - https://sales.jetbrains.com/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: JetBrains s.r.o.
serviceCategory: Developer Tools
billingModel:
  pricingCategory: Tiered Subscription
  billingFrequency: Annual
  billingCurrency: USD/EUR/GBP
  chargeCategories:
    - Purchase
    - Adjustment
    - Refund
    - Credit
focusColumns:
  ServiceName: JetBrains
  ServiceCategory: Developer Tools
  ProviderName: JetBrains
  PublisherName: JetBrains s.r.o.
  InvoiceIssuerName: JetBrains s.r.o.
  BillingCurrency: USD
meters:
  - name: ide_seat
    unit: seat
    aggregation: max
    dimensions:
      - product
      - audience
      - billing_term
  - name: all_products_pack_seat
    unit: seat
    aggregation: max
    dimensions:
      - audience
      - billing_term
  - name: teamcity_build_agent
    unit: build_agent
    aggregation: max
    dimensions:
      - deployment
  - name: youtrack_user
    unit: seat
    aggregation: max
    dimensions:
      - deployment
  - name: space_user
    unit: seat
    aggregation: max
    dimensions:
      - tier
  - name: ai_credits
    unit: credit
    aggregation: sum
    dimensions:
      - tier
      - model
principles:
  - name: Visibility
    description: Use the JetBrains License Vault / Customer Portal to see active subscriptions, seat
      assignments, and AI-credit consumption per user and per team.
  - name: Allocation
    description: Tag licenses with cost center / team via the JetBrains License Server or License Vault;
      attribute AI credits to the developer who consumes them.
  - name: Optimization
    description: Reclaim unused seats; consolidate single-product subscriptions into the All Products
      Pack at scale; lock in 3-year loyalty pricing where commitment is stable; choose AI tier (Pro
      vs Ultimate) based on observed credit burn.
  - name: Accountability
    description: DevOps / Engineering Operations owns the JetBrains tenancy, runs quarterly seat reviews,
      and reconciles AI-credit overages against developer productivity metrics.
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
