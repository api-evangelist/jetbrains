naftiko: 1.0.0-alpha2
info:
  label: JetBrains Marketplace API — Plugin Download
  description: 'JetBrains Marketplace API — Plugin Download. 1 operations. Lead operation: JetBrains Download Plugin. Self-contained
    Naftiko capability covering one Jetbrains business surface.'
  tags:
  - Jetbrains
  - Plugin Download
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JETBRAINS_API_KEY: JETBRAINS_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketplace-plugin-download
    baseUri: https://plugins.jetbrains.com
    description: JetBrains Marketplace API — Plugin Download business capability. Self-contained, no shared references.
    resources:
    - name: plugin-download
      path: /plugin/download
      operations:
      - name: downloadplugin
        method: GET
        description: JetBrains Download Plugin
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: pluginId
          in: query
          type: string
        - name: version
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.JETBRAINS_API_KEY}}'
  exposes:
  - type: rest
    namespace: marketplace-plugin-download-rest
    port: 8080
    description: REST adapter for JetBrains Marketplace API — Plugin Download. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/plugin/download
      name: plugin-download
      description: REST surface for plugin-download.
      operations:
      - method: GET
        name: downloadplugin
        description: JetBrains Download Plugin
        call: marketplace-plugin-download.downloadplugin
        with:
          pluginId: rest.pluginId
          version: rest.version
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketplace-plugin-download-mcp
    port: 9090
    transport: http
    description: MCP adapter for JetBrains Marketplace API — Plugin Download. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: jetbrains-download-plugin
      description: JetBrains Download Plugin
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: marketplace-plugin-download.downloadplugin
      with:
        pluginId: tools.pluginId
        version: tools.version
      outputParameters:
      - type: object
        mapping: $.
