naftiko: 1.0.0-alpha2
info:
  label: JetBrains YouTrack REST API — Activities
  description: 'JetBrains YouTrack REST API — Activities. 1 operations. Lead operation: JetBrains List Activities. Self-contained
    Naftiko capability covering one Jetbrains business surface.'
  tags:
  - Jetbrains
  - Activities
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JETBRAINS_API_KEY: JETBRAINS_API_KEY
capability:
  consumes:
  - type: http
    namespace: youtrack-activities
    baseUri: https://{instance}.youtrack.cloud/api
    description: JetBrains YouTrack REST API — Activities business capability. Self-contained, no shared references.
    resources:
    - name: activities
      path: /activities
      operations:
      - name: listactivities
        method: GET
        description: JetBrains List Activities
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: categories
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.JETBRAINS_API_KEY}}'
  exposes:
  - type: rest
    namespace: youtrack-activities-rest
    port: 8080
    description: REST adapter for JetBrains YouTrack REST API — Activities. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/activities
      name: activities
      description: REST surface for activities.
      operations:
      - method: GET
        name: listactivities
        description: JetBrains List Activities
        call: youtrack-activities.listactivities
        with:
          categories: rest.categories
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: youtrack-activities-mcp
    port: 9090
    transport: http
    description: MCP adapter for JetBrains YouTrack REST API — Activities. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: jetbrains-list-activities
      description: JetBrains List Activities
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: youtrack-activities.listactivities
      with:
        categories: tools.categories
      outputParameters:
      - type: object
        mapping: $.
