naftiko: 1.0.0-alpha2
info:
  label: JetBrains Space HTTP API — Applications
  description: 'JetBrains Space HTTP API — Applications. 1 operations. Lead operation: JetBrains List Applications. Self-contained
    Naftiko capability covering one Jetbrains business surface.'
  tags:
  - Jetbrains
  - Applications
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JETBRAINS_API_KEY: JETBRAINS_API_KEY
capability:
  consumes:
  - type: http
    namespace: space-applications
    baseUri: https://{organization}.jetbrains.space/api/http
    description: JetBrains Space HTTP API — Applications business capability. Self-contained, no shared references.
    resources:
    - name: applications
      path: /applications
      operations:
      - name: listapplications
        method: GET
        description: JetBrains List Applications
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.JETBRAINS_API_KEY}}'
  exposes:
  - type: rest
    namespace: space-applications-rest
    port: 8080
    description: REST adapter for JetBrains Space HTTP API — Applications. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/applications
      name: applications
      description: REST surface for applications.
      operations:
      - method: GET
        name: listapplications
        description: JetBrains List Applications
        call: space-applications.listapplications
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: space-applications-mcp
    port: 9090
    transport: http
    description: MCP adapter for JetBrains Space HTTP API — Applications. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: jetbrains-list-applications
      description: JetBrains List Applications
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: space-applications.listapplications
      outputParameters:
      - type: object
        mapping: $.
