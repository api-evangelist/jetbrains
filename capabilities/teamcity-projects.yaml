naftiko: 1.0.0-alpha2
info:
  label: JetBrains TeamCity REST API — Projects
  description: 'JetBrains TeamCity REST API — Projects. 3 operations. Lead operation: JetBrains List Projects. Self-contained
    Naftiko capability covering one Jetbrains business surface.'
  tags:
  - Jetbrains
  - Projects
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JETBRAINS_API_KEY: JETBRAINS_API_KEY
capability:
  consumes:
  - type: http
    namespace: teamcity-projects
    baseUri: https://{server}/app/rest
    description: JetBrains TeamCity REST API — Projects business capability. Self-contained, no shared references.
    resources:
    - name: projects
      path: /projects
      operations:
      - name: listprojects
        method: GET
        description: JetBrains List Projects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: locator
          in: query
          type: string
        - name: fields
          in: query
          type: string
      - name: createproject
        method: POST
        description: JetBrains Create Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: projects-projectLocator
      path: /projects/{projectLocator}
      operations:
      - name: getproject
        method: GET
        description: JetBrains Get Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectLocator
          in: path
          type: string
          required: true
        - name: fields
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.JETBRAINS_API_KEY}}'
  exposes:
  - type: rest
    namespace: teamcity-projects-rest
    port: 8080
    description: REST adapter for JetBrains TeamCity REST API — Projects. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/projects
      name: projects
      description: REST surface for projects.
      operations:
      - method: GET
        name: listprojects
        description: JetBrains List Projects
        call: teamcity-projects.listprojects
        with:
          locator: rest.locator
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createproject
        description: JetBrains Create Project
        call: teamcity-projects.createproject
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/projects/{projectlocator}
      name: projects-projectlocator
      description: REST surface for projects-projectLocator.
      operations:
      - method: GET
        name: getproject
        description: JetBrains Get Project
        call: teamcity-projects.getproject
        with:
          projectLocator: rest.projectLocator
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: teamcity-projects-mcp
    port: 9090
    transport: http
    description: MCP adapter for JetBrains TeamCity REST API — Projects. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: jetbrains-list-projects
      description: JetBrains List Projects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: teamcity-projects.listprojects
      with:
        locator: tools.locator
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
    - name: jetbrains-create-project
      description: JetBrains Create Project
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: teamcity-projects.createproject
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
    - name: jetbrains-get-project
      description: JetBrains Get Project
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: teamcity-projects.getproject
      with:
        projectLocator: tools.projectLocator
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
