naftiko: 1.0.0-alpha2
info:
  label: JetBrains Space HTTP API — Packages
  description: 'JetBrains Space HTTP API — Packages. 1 operations. Lead operation: JetBrains List Package Repositories. Self-contained
    Naftiko capability covering one Jetbrains business surface.'
  tags:
  - Jetbrains
  - Packages
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JETBRAINS_API_KEY: JETBRAINS_API_KEY
capability:
  consumes:
  - type: http
    namespace: space-packages
    baseUri: https://{organization}.jetbrains.space/api/http
    description: JetBrains Space HTTP API — Packages business capability. Self-contained, no shared references.
    resources:
    - name: projects-projectId-packages-repositories
      path: /projects/{projectId}/packages/repositories
      operations:
      - name: listpackagerepositories
        method: GET
        description: JetBrains List Package Repositories
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.JETBRAINS_API_KEY}}'
  exposes:
  - type: rest
    namespace: space-packages-rest
    port: 8080
    description: REST adapter for JetBrains Space HTTP API — Packages. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/projects/{projectid}/packages/repositories
      name: projects-projectid-packages-repositories
      description: REST surface for projects-projectId-packages-repositories.
      operations:
      - method: GET
        name: listpackagerepositories
        description: JetBrains List Package Repositories
        call: space-packages.listpackagerepositories
        with:
          projectId: rest.projectId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: space-packages-mcp
    port: 9090
    transport: http
    description: MCP adapter for JetBrains Space HTTP API — Packages. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: jetbrains-list-package-repositories
      description: JetBrains List Package Repositories
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: space-packages.listpackagerepositories
      with:
        projectId: tools.projectId
      outputParameters:
      - type: object
        mapping: $.
