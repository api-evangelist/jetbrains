naftiko: 1.0.0-alpha2
info:
  label: JetBrains YouTrack REST API — Saved Queries
  description: 'JetBrains YouTrack REST API — Saved Queries. 1 operations. Lead operation: JetBrains List Saved Queries. Self-contained
    Naftiko capability covering one Jetbrains business surface.'
  tags:
  - Jetbrains
  - Saved Queries
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JETBRAINS_API_KEY: JETBRAINS_API_KEY
capability:
  consumes:
  - type: http
    namespace: youtrack-saved-queries
    baseUri: https://{instance}.youtrack.cloud/api
    description: JetBrains YouTrack REST API — Saved Queries business capability. Self-contained, no shared references.
    resources:
    - name: savedQueries
      path: /savedQueries
      operations:
      - name: listsavedqueries
        method: GET
        description: JetBrains List Saved Queries
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.JETBRAINS_API_KEY}}'
  exposes:
  - type: rest
    namespace: youtrack-saved-queries-rest
    port: 8080
    description: REST adapter for JetBrains YouTrack REST API — Saved Queries. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/savedqueries
      name: savedqueries
      description: REST surface for savedQueries.
      operations:
      - method: GET
        name: listsavedqueries
        description: JetBrains List Saved Queries
        call: youtrack-saved-queries.listsavedqueries
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: youtrack-saved-queries-mcp
    port: 9090
    transport: http
    description: MCP adapter for JetBrains YouTrack REST API — Saved Queries. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: jetbrains-list-saved-queries
      description: JetBrains List Saved Queries
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: youtrack-saved-queries.listsavedqueries
      outputParameters:
      - type: object
        mapping: $.
