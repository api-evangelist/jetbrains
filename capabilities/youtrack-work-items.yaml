naftiko: 1.0.0-alpha2
info:
  label: JetBrains YouTrack REST API — Work Items
  description: 'JetBrains YouTrack REST API — Work Items. 1 operations. Lead operation: JetBrains List Work Items. Self-contained
    Naftiko capability covering one Jetbrains business surface.'
  tags:
  - Jetbrains
  - Work Items
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JETBRAINS_API_KEY: JETBRAINS_API_KEY
capability:
  consumes:
  - type: http
    namespace: youtrack-work-items
    baseUri: https://{instance}.youtrack.cloud/api
    description: JetBrains YouTrack REST API — Work Items business capability. Self-contained, no shared references.
    resources:
    - name: issues-issueId-timeTracking-workItems
      path: /issues/{issueId}/timeTracking/workItems
      operations:
      - name: listworkitems
        method: GET
        description: JetBrains List Work Items
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: issueId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.JETBRAINS_API_KEY}}'
  exposes:
  - type: rest
    namespace: youtrack-work-items-rest
    port: 8080
    description: REST adapter for JetBrains YouTrack REST API — Work Items. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/issues/{issueid}/timetracking/workitems
      name: issues-issueid-timetracking-workitems
      description: REST surface for issues-issueId-timeTracking-workItems.
      operations:
      - method: GET
        name: listworkitems
        description: JetBrains List Work Items
        call: youtrack-work-items.listworkitems
        with:
          issueId: rest.issueId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: youtrack-work-items-mcp
    port: 9090
    transport: http
    description: MCP adapter for JetBrains YouTrack REST API — Work Items. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: jetbrains-list-work-items
      description: JetBrains List Work Items
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: youtrack-work-items.listworkitems
      with:
        issueId: tools.issueId
      outputParameters:
      - type: object
        mapping: $.
