naftiko: 1.0.0-alpha2
info:
  label: JetBrains Hub REST API — Roles
  description: 'JetBrains Hub REST API — Roles. 1 operations. Lead operation: JetBrains List Roles. Self-contained Naftiko
    capability covering one Jetbrains business surface.'
  tags:
  - Jetbrains
  - Roles
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JETBRAINS_API_KEY: JETBRAINS_API_KEY
capability:
  consumes:
  - type: http
    namespace: hub-roles
    baseUri: https://{instance}.youtrack.cloud/hub/api/rest
    description: JetBrains Hub REST API — Roles business capability. Self-contained, no shared references.
    resources:
    - name: roles
      path: /roles
      operations:
      - name: listroles
        method: GET
        description: JetBrains List Roles
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.JETBRAINS_API_KEY}}'
  exposes:
  - type: rest
    namespace: hub-roles-rest
    port: 8080
    description: REST adapter for JetBrains Hub REST API — Roles. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/roles
      name: roles
      description: REST surface for roles.
      operations:
      - method: GET
        name: listroles
        description: JetBrains List Roles
        call: hub-roles.listroles
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: hub-roles-mcp
    port: 9090
    transport: http
    description: MCP adapter for JetBrains Hub REST API — Roles. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: jetbrains-list-roles
      description: JetBrains List Roles
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hub-roles.listroles
      outputParameters:
      - type: object
        mapping: $.
