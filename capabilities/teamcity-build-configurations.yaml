naftiko: 1.0.0-alpha2
info:
  label: JetBrains TeamCity REST API — Build Configurations
  description: 'JetBrains TeamCity REST API — Build Configurations. 1 operations. Lead operation: JetBrains List Build Configurations.
    Self-contained Naftiko capability covering one Jetbrains business surface.'
  tags:
  - Jetbrains
  - Build Configurations
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JETBRAINS_API_KEY: JETBRAINS_API_KEY
capability:
  consumes:
  - type: http
    namespace: teamcity-build-configurations
    baseUri: https://{server}/app/rest
    description: JetBrains TeamCity REST API — Build Configurations business capability. Self-contained, no shared references.
    resources:
    - name: buildTypes
      path: /buildTypes
      operations:
      - name: listbuildtypes
        method: GET
        description: JetBrains List Build Configurations
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: locator
          in: query
          type: string
        - name: fields
          in: query
          type: string
    authentication:
      type: bearer
      token: '{{env.JETBRAINS_API_KEY}}'
  exposes:
  - type: rest
    namespace: teamcity-build-configurations-rest
    port: 8080
    description: REST adapter for JetBrains TeamCity REST API — Build Configurations. One Spectral-compliant resource per
      consumed operation, prefixed with /v1.
    resources:
    - path: /v1/buildtypes
      name: buildtypes
      description: REST surface for buildTypes.
      operations:
      - method: GET
        name: listbuildtypes
        description: JetBrains List Build Configurations
        call: teamcity-build-configurations.listbuildtypes
        with:
          locator: rest.locator
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: teamcity-build-configurations-mcp
    port: 9090
    transport: http
    description: MCP adapter for JetBrains TeamCity REST API — Build Configurations. One tool per consumed operation, routed
      inline through this capability's consumes block.
    tools:
    - name: jetbrains-list-build-configurations
      description: JetBrains List Build Configurations
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: teamcity-build-configurations.listbuildtypes
      with:
        locator: tools.locator
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
