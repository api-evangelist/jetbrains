naftiko: 1.0.0-alpha2
info:
  label: JetBrains Hub REST API — Users
  description: 'JetBrains Hub REST API — Users. 2 operations. Lead operation: JetBrains List Users. Self-contained Naftiko
    capability covering one Jetbrains business surface.'
  tags:
  - Jetbrains
  - Users
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JETBRAINS_API_KEY: JETBRAINS_API_KEY
capability:
  consumes:
  - type: http
    namespace: hub-users
    baseUri: https://{instance}.youtrack.cloud/hub/api/rest
    description: JetBrains Hub REST API — Users business capability. Self-contained, no shared references.
    resources:
    - name: users
      path: /users
      operations:
      - name: listusers
        method: GET
        description: JetBrains List Users
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: string
        - name: $skip
          in: query
          type: integer
        - name: $top
          in: query
          type: integer
    - name: users-userId
      path: /users/{userId}
      operations:
      - name: getuser
        method: GET
        description: JetBrains Get User
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: userId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.JETBRAINS_API_KEY}}'
  exposes:
  - type: rest
    namespace: hub-users-rest
    port: 8080
    description: REST adapter for JetBrains Hub REST API — Users. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/users
      name: users
      description: REST surface for users.
      operations:
      - method: GET
        name: listusers
        description: JetBrains List Users
        call: hub-users.listusers
        with:
          fields: rest.fields
          $skip: rest.$skip
          $top: rest.$top
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/users/{userid}
      name: users-userid
      description: REST surface for users-userId.
      operations:
      - method: GET
        name: getuser
        description: JetBrains Get User
        call: hub-users.getuser
        with:
          userId: rest.userId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: hub-users-mcp
    port: 9090
    transport: http
    description: MCP adapter for JetBrains Hub REST API — Users. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: jetbrains-list-users
      description: JetBrains List Users
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hub-users.listusers
      with:
        fields: tools.fields
        $skip: tools.$skip
        $top: tools.$top
      outputParameters:
      - type: object
        mapping: $.
    - name: jetbrains-get-user
      description: JetBrains Get User
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hub-users.getuser
      with:
        userId: tools.userId
      outputParameters:
      - type: object
        mapping: $.
