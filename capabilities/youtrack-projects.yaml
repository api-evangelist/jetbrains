naftiko: 1.0.0-alpha2
info:
  label: JetBrains YouTrack REST API — Projects
  description: 'JetBrains YouTrack REST API — Projects. 2 operations. Lead operation: JetBrains List Projects. Self-contained
    Naftiko capability covering one Jetbrains business surface.'
  tags:
  - Jetbrains
  - Projects
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JETBRAINS_API_KEY: JETBRAINS_API_KEY
capability:
  consumes:
  - type: http
    namespace: youtrack-projects
    baseUri: https://{instance}.youtrack.cloud/api
    description: JetBrains YouTrack REST API — Projects business capability. Self-contained, no shared references.
    resources:
    - name: admin-projects
      path: /admin/projects
      operations:
      - name: listprojects
        method: GET
        description: JetBrains List Projects
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: fields
          in: query
          type: string
    - name: admin-projects-projectId
      path: /admin/projects/{projectId}
      operations:
      - name: getproject
        method: GET
        description: JetBrains Get Project
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.JETBRAINS_API_KEY}}'
  exposes:
  - type: rest
    namespace: youtrack-projects-rest
    port: 8080
    description: REST adapter for JetBrains YouTrack REST API — Projects. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/admin/projects
      name: admin-projects
      description: REST surface for admin-projects.
      operations:
      - method: GET
        name: listprojects
        description: JetBrains List Projects
        call: youtrack-projects.listprojects
        with:
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/admin/projects/{projectid}
      name: admin-projects-projectid
      description: REST surface for admin-projects-projectId.
      operations:
      - method: GET
        name: getproject
        description: JetBrains Get Project
        call: youtrack-projects.getproject
        with:
          projectId: rest.projectId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: youtrack-projects-mcp
    port: 9090
    transport: http
    description: MCP adapter for JetBrains YouTrack REST API — Projects. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: jetbrains-list-projects
      description: JetBrains List Projects
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: youtrack-projects.listprojects
      with:
        fields: tools.fields
      outputParameters:
      - type: object
        mapping: $.
    - name: jetbrains-get-project
      description: JetBrains Get Project
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: youtrack-projects.getproject
      with:
        projectId: tools.projectId
      outputParameters:
      - type: object
        mapping: $.
