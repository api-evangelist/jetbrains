      path: /issues
      operations:
      - name: listissues
        method: GET
        description: JetBrains List Issues
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: query
          in: query
          type: string
        - name: fields
          in: query
          type: string
        - name: $skip
          in: query
          type: integer
        - name: $top
          in: query
          type: integer
      - name: createissue
        method: POST
        description: JetBrains Create Issue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    - name: issues-issueId
      path: /issues/{issueId}
      operations:
      - name: getissue
        method: GET
        description: JetBrains Get Issue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: issueId
          in: path
          type: string
          required: true
        - name: fields
          in: query
          type: string
      - name: updateissue
        method: POST
        description: JetBrains Update Issue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: issueId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
      - name: deleteissue
        method: DELETE
        description: JetBrains Delete Issue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: issueId
          in: path
          type: string
          required: true
    - name: issues-issueId-comments
      path: /issues/{issueId}/comments
      operations:
      - name: listissuecomments
        method: GET
        description: JetBrains List Issue Comments
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
