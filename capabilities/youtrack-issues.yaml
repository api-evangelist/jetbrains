          in: path
          type: string
          required: true
      - name: addissuecomment
        method: POST
        description: JetBrains Add Issue Comment
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: issueId
          in: path
          type: string
          required: true
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.JETBRAINS_API_KEY}}'
  exposes:
  - type: rest
    namespace: youtrack-issues-rest
    port: 8080
    description: REST adapter for JetBrains YouTrack REST API — Issues. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/issues
      name: issues
      description: REST surface for issues.
      operations:
      - method: GET
        name: listissues
        description: JetBrains List Issues
        call: youtrack-issues.listissues
        with:
          query: rest.query
          fields: rest.fields
          $skip: rest.$skip
          $top: rest.$top
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: createissue
        description: JetBrains Create Issue
        call: youtrack-issues.createissue
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/issues/{issueid}
      name: issues-issueid
      description: REST surface for issues-issueId.
      operations:
      - method: GET
        name: getissue
        description: JetBrains Get Issue
        call: youtrack-issues.getissue
        with:
          issueId: rest.issueId
          fields: rest.fields
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: updateissue
        description: JetBrains Update Issue
        call: youtrack-issues.updateissue
        with:
          issueId: rest.issueId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
      - method: DELETE
        name: deleteissue
        description: JetBrains Delete Issue
        call: youtrack-issues.deleteissue
        with:
          issueId: rest.issueId
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/issues/{issueid}/comments
      name: issues-issueid-comments
      description: REST surface for issues-issueId-comments.
      operations:
      - method: GET
        name: listissuecomments
        description: JetBrains List Issue Comments
        call: youtrack-issues.listissuecomments
        with:
          issueId: rest.issueId
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: addissuecomment
        description: JetBrains Add Issue Comment
        call: youtrack-issues.addissuecomment
        with:
          issueId: rest.issueId
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
