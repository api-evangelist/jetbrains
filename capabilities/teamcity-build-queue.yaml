naftiko: 1.0.0-alpha2
info:
  label: JetBrains TeamCity REST API — Build Queue
  description: 'JetBrains TeamCity REST API — Build Queue. 2 operations. Lead operation: JetBrains List Build Queue. Self-contained
    Naftiko capability covering one Jetbrains business surface.'
  tags:
  - Jetbrains
  - Build Queue
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JETBRAINS_API_KEY: JETBRAINS_API_KEY
capability:
  consumes:
  - type: http
    namespace: teamcity-build-queue
    baseUri: https://{server}/app/rest
    description: JetBrains TeamCity REST API — Build Queue business capability. Self-contained, no shared references.
    resources:
    - name: buildQueue
      path: /buildQueue
      operations:
      - name: listbuildqueue
        method: GET
        description: JetBrains List Build Queue
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: locator
          in: query
          type: string
      - name: triggerbuild
        method: POST
        description: JetBrains Trigger Build
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.JETBRAINS_API_KEY}}'
  exposes:
  - type: rest
    namespace: teamcity-build-queue-rest
    port: 8080
    description: REST adapter for JetBrains TeamCity REST API — Build Queue. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/buildqueue
      name: buildqueue
      description: REST surface for buildQueue.
      operations:
      - method: GET
        name: listbuildqueue
        description: JetBrains List Build Queue
        call: teamcity-build-queue.listbuildqueue
        with:
          locator: rest.locator
        outputParameters:
        - type: object
          mapping: $.
      - method: POST
        name: triggerbuild
        description: JetBrains Trigger Build
        call: teamcity-build-queue.triggerbuild
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: teamcity-build-queue-mcp
    port: 9090
    transport: http
    description: MCP adapter for JetBrains TeamCity REST API — Build Queue. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: jetbrains-list-build-queue
      description: JetBrains List Build Queue
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: teamcity-build-queue.listbuildqueue
      with:
        locator: tools.locator
      outputParameters:
      - type: object
        mapping: $.
    - name: jetbrains-trigger-build
      description: JetBrains Trigger Build
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: teamcity-build-queue.triggerbuild
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
