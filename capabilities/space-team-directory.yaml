naftiko: 1.0.0-alpha2
info:
  label: JetBrains Space HTTP API — Team Directory
  description: 'JetBrains Space HTTP API — Team Directory. 2 operations. Lead operation: JetBrains List Team Members. Self-contained
    Naftiko capability covering one Jetbrains business surface.'
  tags:
  - Jetbrains
  - Team Directory
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JETBRAINS_API_KEY: JETBRAINS_API_KEY
capability:
  consumes:
  - type: http
    namespace: space-team-directory
    baseUri: https://{organization}.jetbrains.space/api/http
    description: JetBrains Space HTTP API — Team Directory business capability. Self-contained, no shared references.
    resources:
    - name: team-directory-profiles
      path: /team-directory/profiles
      operations:
      - name: listteammembers
        method: GET
        description: JetBrains List Team Members
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    - name: team-directory-teams
      path: /team-directory/teams
      operations:
      - name: listteams
        method: GET
        description: JetBrains List Teams
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.JETBRAINS_API_KEY}}'
  exposes:
  - type: rest
    namespace: space-team-directory-rest
    port: 8080
    description: REST adapter for JetBrains Space HTTP API — Team Directory. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/team-directory/profiles
      name: team-directory-profiles
      description: REST surface for team-directory-profiles.
      operations:
      - method: GET
        name: listteammembers
        description: JetBrains List Team Members
        call: space-team-directory.listteammembers
        outputParameters:
        - type: object
          mapping: $.
    - path: /v1/team-directory/teams
      name: team-directory-teams
      description: REST surface for team-directory-teams.
      operations:
      - method: GET
        name: listteams
        description: JetBrains List Teams
        call: space-team-directory.listteams
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: space-team-directory-mcp
    port: 9090
    transport: http
    description: MCP adapter for JetBrains Space HTTP API — Team Directory. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: jetbrains-list-team-members
      description: JetBrains List Team Members
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: space-team-directory.listteammembers
      outputParameters:
      - type: object
        mapping: $.
    - name: jetbrains-list-teams
      description: JetBrains List Teams
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: space-team-directory.listteams
      outputParameters:
      - type: object
        mapping: $.
