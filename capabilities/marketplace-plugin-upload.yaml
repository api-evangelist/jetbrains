naftiko: 1.0.0-alpha2
info:
  label: JetBrains Marketplace API — Plugin Upload
  description: 'JetBrains Marketplace API — Plugin Upload. 1 operations. Lead operation: JetBrains Upload Plugin. Self-contained
    Naftiko capability covering one Jetbrains business surface.'
  tags:
  - Jetbrains
  - Plugin Upload
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JETBRAINS_API_KEY: JETBRAINS_API_KEY
capability:
  consumes:
  - type: http
    namespace: marketplace-plugin-upload
    baseUri: https://plugins.jetbrains.com
    description: JetBrains Marketplace API — Plugin Upload business capability. Self-contained, no shared references.
    resources:
    - name: api-updates-upload
      path: /api/updates/upload
      operations:
      - name: uploadplugin
        method: POST
        description: JetBrains Upload Plugin
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: body
          in: body
          type: object
          description: Request body (JSON).
          required: true
    authentication:
      type: bearer
      token: '{{env.JETBRAINS_API_KEY}}'
  exposes:
  - type: rest
    namespace: marketplace-plugin-upload-rest
    port: 8080
    description: REST adapter for JetBrains Marketplace API — Plugin Upload. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/api/updates/upload
      name: api-updates-upload
      description: REST surface for api-updates-upload.
      operations:
      - method: POST
        name: uploadplugin
        description: JetBrains Upload Plugin
        call: marketplace-plugin-upload.uploadplugin
        with:
          body: rest.body
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: marketplace-plugin-upload-mcp
    port: 9090
    transport: http
    description: MCP adapter for JetBrains Marketplace API — Plugin Upload. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: jetbrains-upload-plugin
      description: JetBrains Upload Plugin
      hints:
        readOnly: false
        destructive: false
        idempotent: false
      call: marketplace-plugin-upload.uploadplugin
      with:
        body: tools.body
      outputParameters:
      - type: object
        mapping: $.
