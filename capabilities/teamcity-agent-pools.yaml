naftiko: 1.0.0-alpha2
info:
  label: JetBrains TeamCity REST API — Agent Pools
  description: 'JetBrains TeamCity REST API — Agent Pools. 1 operations. Lead operation: JetBrains List Agent Pools. Self-contained
    Naftiko capability covering one Jetbrains business surface.'
  tags:
  - Jetbrains
  - Agent Pools
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JETBRAINS_API_KEY: JETBRAINS_API_KEY
capability:
  consumes:
  - type: http
    namespace: teamcity-agent-pools
    baseUri: https://{server}/app/rest
    description: JetBrains TeamCity REST API — Agent Pools business capability. Self-contained, no shared references.
    resources:
    - name: agentPools
      path: /agentPools
      operations:
      - name: listagentpools
        method: GET
        description: JetBrains List Agent Pools
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.JETBRAINS_API_KEY}}'
  exposes:
  - type: rest
    namespace: teamcity-agent-pools-rest
    port: 8080
    description: REST adapter for JetBrains TeamCity REST API — Agent Pools. One Spectral-compliant resource per consumed
      operation, prefixed with /v1.
    resources:
    - path: /v1/agentpools
      name: agentpools
      description: REST surface for agentPools.
      operations:
      - method: GET
        name: listagentpools
        description: JetBrains List Agent Pools
        call: teamcity-agent-pools.listagentpools
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: teamcity-agent-pools-mcp
    port: 9090
    transport: http
    description: MCP adapter for JetBrains TeamCity REST API — Agent Pools. One tool per consumed operation, routed inline
      through this capability's consumes block.
    tools:
    - name: jetbrains-list-agent-pools
      description: JetBrains List Agent Pools
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: teamcity-agent-pools.listagentpools
      outputParameters:
      - type: object
        mapping: $.
