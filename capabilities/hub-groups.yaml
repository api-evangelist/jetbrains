naftiko: 1.0.0-alpha2
info:
  label: JetBrains Hub REST API — Groups
  description: 'JetBrains Hub REST API — Groups. 1 operations. Lead operation: JetBrains List User Groups. Self-contained
    Naftiko capability covering one Jetbrains business surface.'
  tags:
  - Jetbrains
  - Groups
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JETBRAINS_API_KEY: JETBRAINS_API_KEY
capability:
  consumes:
  - type: http
    namespace: hub-groups
    baseUri: https://{instance}.youtrack.cloud/hub/api/rest
    description: JetBrains Hub REST API — Groups business capability. Self-contained, no shared references.
    resources:
    - name: usergroups
      path: /usergroups
      operations:
      - name: listusergroups
        method: GET
        description: JetBrains List User Groups
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
    authentication:
      type: bearer
      token: '{{env.JETBRAINS_API_KEY}}'
  exposes:
  - type: rest
    namespace: hub-groups-rest
    port: 8080
    description: REST adapter for JetBrains Hub REST API — Groups. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/usergroups
      name: usergroups
      description: REST surface for usergroups.
      operations:
      - method: GET
        name: listusergroups
        description: JetBrains List User Groups
        call: hub-groups.listusergroups
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: hub-groups-mcp
    port: 9090
    transport: http
    description: MCP adapter for JetBrains Hub REST API — Groups. One tool per consumed operation, routed inline through this
      capability's consumes block.
    tools:
    - name: jetbrains-list-user-groups
      description: JetBrains List User Groups
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: hub-groups.listusergroups
      outputParameters:
      - type: object
        mapping: $.
