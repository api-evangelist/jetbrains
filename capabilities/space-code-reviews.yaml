naftiko: 1.0.0-alpha2
info:
  label: JetBrains Space HTTP API — Code Reviews
  description: 'JetBrains Space HTTP API — Code Reviews. 1 operations. Lead operation: JetBrains List Code Reviews. Self-contained
    Naftiko capability covering one Jetbrains business surface.'
  tags:
  - Jetbrains
  - Code Reviews
  created: '2026-05-19'
  modified: '2026-05-19'
binds:
- namespace: env
  keys:
    JETBRAINS_API_KEY: JETBRAINS_API_KEY
capability:
  consumes:
  - type: http
    namespace: space-code-reviews
    baseUri: https://{organization}.jetbrains.space/api/http
    description: JetBrains Space HTTP API — Code Reviews business capability. Self-contained, no shared references.
    resources:
    - name: projects-projectId-code-reviews
      path: /projects/{projectId}/code-reviews
      operations:
      - name: listcodereviews
        method: GET
        description: JetBrains List Code Reviews
        outputRawFormat: json
        outputParameters:
        - name: result
          type: object
          value: $.
        inputParameters:
        - name: projectId
          in: path
          type: string
          required: true
    authentication:
      type: bearer
      token: '{{env.JETBRAINS_API_KEY}}'
  exposes:
  - type: rest
    namespace: space-code-reviews-rest
    port: 8080
    description: REST adapter for JetBrains Space HTTP API — Code Reviews. One Spectral-compliant resource per consumed operation,
      prefixed with /v1.
    resources:
    - path: /v1/projects/{projectid}/code-reviews
      name: projects-projectid-code-reviews
      description: REST surface for projects-projectId-code-reviews.
      operations:
      - method: GET
        name: listcodereviews
        description: JetBrains List Code Reviews
        call: space-code-reviews.listcodereviews
        with:
          projectId: rest.projectId
        outputParameters:
        - type: object
          mapping: $.
  - type: mcp
    namespace: space-code-reviews-mcp
    port: 9090
    transport: http
    description: MCP adapter for JetBrains Space HTTP API — Code Reviews. One tool per consumed operation, routed inline through
      this capability's consumes block.
    tools:
    - name: jetbrains-list-code-reviews
      description: JetBrains List Code Reviews
      hints:
        readOnly: true
        destructive: false
        idempotent: true
      call: space-code-reviews.listcodereviews
      with:
        projectId: tools.projectId
      outputParameters:
      - type: object
        mapping: $.
