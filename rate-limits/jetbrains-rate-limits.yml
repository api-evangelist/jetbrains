specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: JetBrains
providerId: jetbrains
created: '2026-05-04'
modified: '2026-05-05'
reconciled: true
tags:
  - Rate Limiting
  - Developer Tools
  - IDE
  - DevOps
description: JetBrains REST APIs (TeamCity, YouTrack, Space, Hub) are most commonly self-hosted, so
  raw request rate is bounded by the customer's server capacity rather than a vendor-side per-second
  cap. The two SaaS surfaces — JetBrains Space cloud and YouTrack InCloud — apply per-token throttling
  to protect shared infrastructure; published numbers are general guidance, with production raises arranged
  via support. JetBrains AI uses an AI-credit model where rate is bounded by remaining credits per subscription.
sources:
  - https://www.jetbrains.com/help/space/api.html
  - https://www.jetbrains.com/help/youtrack/devportal/api-rate-limit.html
  - https://www.jetbrains.com/help/teamcity/rest/teamcity-rest-api-documentation.html
  - https://www.jetbrains.com/ai-ides/buy/
headers:
  retryAfter: Retry-After
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: YouTrack InCloud REST API
    scope: token
    metric: requests_per_second
    limit: 30
    timeFrame: second
    notes: Soft cap per permanent token / OAuth client on InCloud. Self-hosted YouTrack is bounded
      by your server hardware.
  - name: Space HTTP API
    scope: token
    metric: requests_per_minute
    limit: 'see organization plan'
    notes: Per-organization throttling; raise via JetBrains support for production integrations.
  - name: TeamCity REST API
    scope: server
    metric: varies
    limit: bounded by self-hosted capacity
    notes: TeamCity REST API has no provider-side rate limit; throughput is governed by the customer's
      TeamCity server and database. TeamCity Cloud applies per-tenant fair-use throttling.
  - name: JetBrains AI
    scope: subscription
    metric: ai_credits
    limit: per AI Pro / AI Ultimate subscription
    notes: Throughput is bounded by remaining AI credits for the active subscription tier.
policies:
  - name: Backoff
    description: Honor Retry-After on 429 / 503 and back off exponentially with jitter.
  - name: Pagination
    description: Use the documented `top` and `skip` (or cursor) parameters to avoid retrieving large
      collections in one call.
  - name: Self-hosted vs SaaS
    description: Self-hosted (TeamCity On-Prem, YouTrack Server, Hub) limits are governed by your hardware.
      Cloud (Space, YouTrack InCloud) limits are governed by JetBrains gateway throttling.
  - name: AI credits
    description: JetBrains AI consumes credits per request and per token; users hitting their cap can
      upgrade tier or wait for the monthly reset.
maintainers:
  - FN: API Evangelist
    email: info@apievangelist.com
