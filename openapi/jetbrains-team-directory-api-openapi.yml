openapi: 3.0.3
info:
  title: JetBrains Hub REST Activities Team Directory API
  description: The JetBrains Hub REST API provides programmatic access to Hub, the centralized authentication and authorization service for JetBrains tools. It allows management of users, groups, projects, roles, permissions, and OAuth 2.0 services. Hub serves as the identity provider for YouTrack, TeamCity, and other connected JetBrains services.
  version: 2024.1.0
  contact:
    name: JetBrains
    url: https://www.jetbrains.com/help/youtrack/devportal/hub-rest-api-reference.html
  license:
    name: Proprietary
    url: https://www.jetbrains.com/legal/
servers:
- url: https://{instance}.youtrack.cloud/hub/api/rest
  description: Hub API (via YouTrack Cloud)
  variables:
    instance:
      default: myinstance
      description: Your instance name
security:
- bearerAuth: []
tags:
- name: Team Directory
  description: Team and member management
paths:
  /team-directory/profiles:
    get:
      summary: JetBrains List Team Members
      description: Returns a list of team member profiles.
      operationId: listTeamMembers
      tags:
      - Team Directory
      responses:
        '200':
          description: Successful response with member list
  /team-directory/teams:
    get:
      summary: JetBrains List Teams
      description: Returns a list of teams in the organization.
      operationId: listTeams
      tags:
      - Team Directory
      responses:
        '200':
          description: Successful response with team list
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      description: Permanent token or OAuth 2.0 Bearer Token
